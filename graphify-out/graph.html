ge/mod.rs", "arrows": "to", "color": {"color": "#2ecc71"}, "label": "defines", "font": {"size": 8, "color": "#666"}, "smooth": {"type": "curvedCW", "roundness": 0.2}}, {"from": "file:src-tauri/src/storage/mod.rs@src-tauri/src/storage/mod.rs", "to": "function:delete_connection@src-tauri/src/storage/mod.rs", "arrows": "to", "color": {"color": "#2ecc71"}, "label": "defines", "font": {"size": 8, "color": "#666"}, "smooth": {"type": "curvedCW", "roundness": 0.2}}, {"from": "file:src-tauri/src/storage/mod.rs@src-tauri/src/storage/mod.rs", "to": "function:save_script_internal@src-tauri/src/storage/mod.rs", "arrows": "to", "color": {"color": "#2ecc71"}, "label": "defines", "font": {"size": 8, "color": "#666"}, "smooth": {"type": "curvedCW", "roundness": 0.2}}, {"from": "file:src-tauri/src/storage/mod.rs@src-tauri/src/storage/mod.rs", "to": "function:get_scripts_internal@src-tauri/src/storage/mod.rs", "arrows": "to", "color": {"color": "#2ecc71"}, "label": "defines", "font": {"size": 8, "color": "#666"}, "smooth": {"type": "curvedCW", "roundness": 0.2}}, {"from": "file:src-tauri/src/storage/mod.rs@src-tauri/src/storage/mod.rs", "to": "function:delete_script_internal@src-tauri/src/storage/mod.rs", "arrows": "to", "color": {"color": "#2ecc71"}, "label": "defines", "font": {"size": 8, "color": "#666"}, "smooth": {"type": "curvedCW", "roundness": 0.2}}];

const container = document.getElementById('graph');
const data = { nodes: new vis.DataSet(nodesData), edges: new vis.DataSet(edgesData) };
const options = {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.008, springLength: 120, springConstant: 0.02 },
    stabilization: { iterations: 200 },
  },
  interaction: { hover: true, tooltipDelay: 100, navigationButtons: true, keyboard: true },
  edges: { font: { size: 8 }, width: 1 },
  groups: {
    file: { borderWidth: 2 },
    class: { borderWidth: 2 },
    component: { borderWidth: 2 },
    struct: { borderWidth: 2 },
    trait: { borderWidth: 2 },
  },
};

const network = new vis.Network(container, data, options);

const infoDiv = document.getElementById('info');
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = nodesData.find(n => n.id === nodeId);
    if (node) {
      infoDiv.innerHTML = '<h3>' + node.group + '</h3><div>' + node.title.replace(/\n/g, '<br>') + '</div>';
      infoDiv.style.display = 'block';
    }
  } else {
    infoDiv.style.display = 'none';
  }
});

document.getElementById('search').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase();
  const updates = nodesData.map(n => ({
    id: n.id,
    opacity: (!query || n.label.toLowerCase().includes(query) || (n.title && n.title.toLowerCase().includes(query))) ? 1.0 : 0.1,
  }));
  data.nodes.update(updates);
});
</script>
